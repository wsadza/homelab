{{- if and .Values.appSecurity.enabled .Values.appSecurity.networkPolicies }}
{{- $root := . -}}
{{- range .Values.appSecurity.networkPolicies }}
{{- if .enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ default (include "common.names.fullname" $root ) .name | quote }}
  namespace: {{ default (include "common.names.namespace" $root ) .namespace | quote }}
  {{- with .labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    {{- toYaml .podSelector | nindent 4 }}
  policyTypes:
    {{- toYaml .policyTypes | nindent 4 }}
  {{- with .ingress }}
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
