apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seaweed-iam-config
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: kubernetes-secrets-seaweed
    kind: ClusterSecretStore

  target:
    name: seaweed-iam-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        iam.json: |
          {
            "sts": {
              "tokenDuration": "1h",
              "maxSessionLength": "12h",
              "issuer": "seaweedfs-sts",
              "signingKey": "{{ .stsSigningKey }}"
            },
            "providers": [
              {
                "name": "keycloak",
                "type": "oidc",
                "enabled": true,
                "config": {
                  "issuer": "https://keycloak.anykey.pl/realms/platform",
                  "clientId": "seaweedfs-s3",
                  "clientSecret": "{{ .keycloakClientSecret }}",
                  "jwksUri": "https://keycloak.anykey.pl/realms/platform/protocol/openid-connect/certs",
                  "tlsInsecureSkipVerify": false,
                  "roleMapping": {
                    "rules": [
                      {
                        "claim": "groups",
                        "value": "s3-app-data",
                        "role": "arn:aws:iam::role/AppDataRole"
                      }
                    ],
                    "defaultRole": "arn:aws:iam::role/S3ReadOnlyRole"
                  }
                }
              }
            ],
            "policies": [
              {
                "name": "AppDataPolicy",
                "document": {
                  "Version": "2012-10-17",
                  "Statement": [
                    {
                      "Effect": "Allow",
                      "Action": [
                        "s3:ListBucket",
                        "s3:GetBucketLocation"
                      ],
                      "Resource": [
                        "arn:aws:s3:::app-data"
                      ]
                    },
                    {
                      "Effect": "Allow",
                      "Action": [
                        "s3:GetObject",
                        "s3:PutObject",
                        "s3:DeleteObject"
                      ],
                      "Resource": [
                        "arn:aws:s3:::app-data/*"
                      ]
                    }
                  ]
                }
              }
            ],
            "roles": [
              {
                "name": "AppDataRole",
                "arn": "arn:aws:iam::role/AppDataRole",
                "policies": [
                  "AppDataPolicy"
                ]
              }
            ]
          }

  data:
    - secretKey: keycloakClientSecret
      remoteRef:
        key: seaweedfs-s3-client
        property: clientSecret

    - secretKey: stsSigningKey
      remoteRef:
        key: seaweedfs-sts-signing-key
        property: signingKey
---
