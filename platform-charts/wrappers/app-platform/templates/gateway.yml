{{- if and .Values.appPlatform.gatewayApi.enabled .Values.appPlatform.gatewayApi.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ default ( printf "gateway-%s" (include "common.names.fullname" . )) .Values.appPlatform.gatewayApi.gateway.name | quote }} 
  namespace: {{ default ( include "common.names.namespace" . ) .Values.appPlatform.gatewayApi.gateway.namespace | quote }} 
  labels:
  {{- include "common.labels.standard" . | nindent 4 }}    
  {{- with .Values.appPlatform.gatewayApi.gateway.labels }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.appPlatform.gatewayApi.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  gatewayClassName: {{ .Values.appPlatform.gatewayApi.gateway.gatewayClassName | quote }}
  listeners:
  {{- range .Values.appPlatform.gatewayApi.gateway.listeners }}
  - name: {{ .name | quote }}
    protocol: {{ .protocol | quote }}
    port: {{ .port }}
    hostname: {{ .hostname | quote }}
    {{- with .tls }}
    tls:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .allowedRoutes }}
    allowedRoutes:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }} 
{{- end }} 
