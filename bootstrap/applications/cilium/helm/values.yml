ipam:
  operator:
    clusterPoolIPv4PodCIDRList:
      - "10.42.0.0/16"

kubeProxyReplacement: false


hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
  tls:
    enabled: true
    auto:
      enabled: true
      method: certmanager
      certManagerIssuerRef:
        group: cert-manager.io
        kind: Issuer
        name: cilium-selfsigned-ca
