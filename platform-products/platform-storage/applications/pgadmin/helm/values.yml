defaults: 
  image: nginx:latest
  restart: always

# ------------------------

env:
  email: admin@anykey.pl
  password: admin

service:
  type: ClusterIP
  port: 80

persistence:
  enabled: true
  storageClass: storage-local-retain
  accessMode: ReadWriteOnce
  size: 1Gi

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ===============================================================
#    ___             ___  __     __  ___             
#   / _ | ___  ___  / _ \/ /__ _/ /_/ _/__  ______ _ 
#  / __ |/ _ \/ _ \/ ___/ / _ `/ __/ _/ _ \/ __/  ' \
# /_/ |_/ .__/ .__/_/  /_/\_,_/\__/_/ \___/_/ /_/_/_/
#      /_/  /_/                                      
#
# : AppPlatform (wrapper chart)
# ===============================================================

appPlatform:

  # ===============================================
  # @section gatewayApi parameters
  # ===============================================
  
  gatewayApi:
    # @param appPlatform.gatewayApi.enabled Enable Gateway API resources.
    enabled: true

    # @param appPlatform.gatewayApi.gateway.enabled Enable Gateway resource generation.
    # @param appPlatform.gatewayApi.gateway.name Gateway resource name.
    # @param appPlatform.gatewayApi.gateway.namespace Namespace where the Gateway will be created.
    # @param appPlatform.gatewayApi.gateway.labels Labels to add to the Gateway.
    # @param appPlatform.gatewayApi.gateway.annotations Annotations to add to the Gateway.
    # @param appPlatform.gatewayApi.gateway.gatewayClassName GatewayClass name used by the Gateway.
    # @param appPlatform.gatewayApi.gateway.listeners List of Gateway listeners. 
    gateway:
      enabled: true
      name: gateway-pgadmin
      namespace: envoy-gateway-system
      labels:
        traffic-profile: shared
      annotations:
        external-dns.alpha.kubernetes.io/target: anykey.pl
      gatewayClassName: envoy

      # @param appPlatform.gatewayApi.gateway.listeners[0].name Listener name.
      # @param appPlatform.gatewayApi.gateway.listeners[0].protocol Listener protocol.
      # @param appPlatform.gatewayApi.gateway.listeners[0].port Listener port.
      # @param appPlatform.gatewayApi.gateway.listeners[0].hostname Hostname accepted by the listener.
      # @param appPlatform.gatewayApi.gateway.listeners[0].allowedRoutes Allowed routes configuration.
      listeners:
        - name: pgadmin-http
          protocol: HTTP
          port: 80
          hostname: pgadmin.anykey.pl
          allowedRoutes:
            namespaces:
              from: All
        - name: pgadmin-https
          protocol: HTTPS
          port: 443
          hostname: pgadmin.anykey.pl
          tls:
            mode: Terminate
            certificateRefs:
              - name: pgadmin-tls-certificate 
          allowedRoutes:
            namespaces:
              from: Selector
              selector:
                matchLabels:
                  kubernetes.io/metadata.name: pgadmin
 
    # @param appPlatform.gatewayApi.httpRoute.enabled Enable HTTPRoute resource generation.
    # @param appPlatform.gatewayApi.httpRoute.name HTTPRoute resource name.
    # @param appPlatform.gatewayApi.httpRoute.namespace Namespace where the HTTPRoute will be created.
    # @param appPlatform.gatewayApi.httpRoute.labels Labels to add to the HTTPRoute.
    # @param appPlatform.gatewayApi.httpRoute.annotations Annotations to add to the HTTPRoute.
    # @param appPlatform.gatewayApi.httpRoute.parentRefs Parent Gateway references.
    # @param appPlatform.gatewayApi.httpRoute.hostnames Hostnames matched by the HTTPRoute.
    # @param appPlatform.gatewayApi.httpRoute.rules HTTPRoute routing rules.
    httpRoute:
      enabled: true
      name: "{{ name }}-host"
      namespace: "{{ namespace }}"
      parentRefs:
        - name: "gateway-{{ name }}"
          namespace: envoy-gateway-system
          sectionName: "{{ name }}-https"
      hostnames:
        - "{{ name }}.anykey.pl"
      rules:
        - backendRefs:
            - kind: Service
              name: "{{ service }}" 
              namespace: "{{ namespace }}" 
              port: 80
  
  # ===============================================
  # @section Certificate parameters
  # ===============================================
  
  # @param appPlatform.certificate.enabled Enable Certificate resource generation.
  # @param appPlatform.certificate.name Certificate resource name.
  # @param appPlatform.certificate.namespace Namespace where the Certificate will be created.
  # @param appPlatform.certificate.existingIssuer Name of an existing Issuer or ClusterIssuer.
  # @param appPlatform.certificate.existingIssuerKind Kind of the existing issuer. Usually Issuer or ClusterIssuer.
  # @param appPlatform.certificate.keySize Private key size.
  # @param appPlatform.certificate.keyAlgorithm Private key algorithm.
  # @param appPlatform.certificate.duration Certificate validity duration.
  # @param appPlatform.certificate.renewBefore How long before expiry cert-manager should renew the certificate.
  # @param appPlatform.certificate.secretName Secret name where the TLS certificate will be stored.
  # @param appPlatform.certificate.dnsNames DNS names covered by the certificate. 
  certificate:
    enabled: true
    name: "{{ name }}-tls-certificate"
    namespace: envoy-gateway-system
    existingIssuer: "issuer-{{ name }}"
    secretName: "{{ name }}-tls-certificate"
    dnsNames:
      - "{{ name }}.anykey.pl"

    # -----------------------------------------------
    # @subsection Issuer parameters
    # -----------------------------------------------
    #
    # @param appPlatform.certificate.issuer.enabled Enable Issuer resource generation.
    # @param appPlatform.certificate.issuer.name Issuer resource name.
    # @param appPlatform.certificate.issuer.namespace Namespace where the Issuer will be created.
    # @param appPlatform.certificate.issuer.kind Issuer kind. Usually Issuer or ClusterIssuer.
    # @param appPlatform.certificate.issuer.acme.email ACME registration email.
    # @param appPlatform.certificate.issuer.acme.server ACME server URL.
    # @param appPlatform.certificate.issuer.acme.privateKeySecretName Secret name used to store the ACME account private key.
    # @param appPlatform.certificate.issuer.acme.gatewayHTTPRoute.parentRefs Gateway parent references used for HTTP-01 challenges. 
    issuer:
      enabled: true
      name: "issuer-{{ name }}"
      namespace: envoy-gateway-system
      acme:
        email: "{{ name }}@anykey.pl"
        gatewayHTTPRoute:
          parentRefs:
            - group: gateway.networking.k8s.io
              kind: Gateway
              name: "gateway-{{ name }}"
              namespace: envoy-gateway-system

