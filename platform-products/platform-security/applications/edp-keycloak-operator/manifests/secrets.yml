apiVersion: v1
kind: Secret
metadata:
  name: keycloak-access
  namespace: keycloak 
type: Opaque
stringData:
  username: keycloak 
  password: admin 
---
apiVersion: v1.edp.epam.com/v1
kind: Keycloak
metadata:
  name: keycloak-endpoint
  namespace: keycloak 
spec:
  url: http://keycloak-service.keycloak.svc.cluster.local:8080
  secret: keycloak-access
