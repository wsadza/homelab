apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: seaweedfs-store
  namespace: default 
spec:
  configuration:
    destinationPath: s3://app-bucket
    endpointURL: http://seaweedfs-s3.seaweedfs.svc.cluster.local:8333
    s3Credentials:
      accessKeyId:
        name: seaweedfs-s3-creds
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: seaweedfs-s3-creds
        key: ACCESS_SECRET_KEY
    wal:
      compression: gzip
    data:
      compression: gzip
