applications:

  # ------------------
  # CloudNativePG (postgresql-operator)
  # ------------------

    - name: cloudnative-pg
      namespace: postgresql-operator

      enabled: true
      priority: -10

      syncPolicy:
        automated: false
        syncOptions:
          - ServerSideApply=true

      sources:

        - type: values
          repoURL: https://github.com/wsadza/homelab.git
          targetRevision: HEAD
          ref: values

        - type: helm
          repoURL: https://cloudnative-pg.io/charts/
          targetRevision: 0.28.0
          chart: cloudnative-pg
          valueFiles: 
            - $values/platform-products/platform-storage/applications/cloudnative-pg/helm/values.yml
      
