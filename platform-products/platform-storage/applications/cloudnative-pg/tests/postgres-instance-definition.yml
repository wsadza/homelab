apiVersion: v1
kind: Secret
metadata:
  name: dummy-db-user
  namespace: default
type: kubernetes.io/basic-auth
stringData:
  username: user
  password: changeme-strong-password
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: dummy-psql-instance
  namespace: default
spec:
  instances: 1

  imageName: ghcr.io/cloudnative-pg/postgresql:16

  bootstrap:
    initdb:
      database: default
      owner: user
      secret:
        name: dummy-db-user 

  storage:
    size: 5Gi

  monitoring:
    enablePodMonitor: true
