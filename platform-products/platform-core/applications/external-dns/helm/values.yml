provider: ovh

sources:
  - service
  - gateway-httproute
  - gateway-tlsroute

policy: sync

registry: txt
txtOwnerId: homelab-dev
txtPrefix: external-dns-

interval: 1m

domainFilters:
  - anykey.pl 

env:
  - name: OVH_APPLICATION_KEY
    valueFrom:
      secretKeyRef:
        name: external-dns-ovh
        key: OVH_APPLICATION_KEY
  - name: OVH_APPLICATION_SECRET
    valueFrom:
      secretKeyRef:
        name: external-dns-ovh
        key: OVH_APPLICATION_SECRET
  - name: OVH_CONSUMER_KEY
    valueFrom:
      secretKeyRef:
        name: external-dns-ovh
        key: OVH_CONSUMER_KEY

serviceAccount:
  create: true
  name: external-dns

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi
