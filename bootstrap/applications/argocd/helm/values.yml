# -- Argo Instance Extra Configuration
configs:
  cm:

    kustomize.buildOptions: "--enable-alpha-plugins --enable-exec"

    # -- Timeout to discover if a new manifests version got published to the repository
    timeout.reconciliation: 30s

    # -- Maximum jitter added to the reconciliation timeout to spread out refreshes and reduce repo-server load
    timeout.reconciliation.jitter: 0s

  # -- Create the argocd-secret
  secret:
    createSecret: false 

  # -- Insecure TLS
  params:
    server.insecure: true # HTTPS backend

# -- SOPS

repoServer:
  volumes:
    - name: custom-tools
      emptyDir: {}
    - name: sops-age
      secret:
        secretName: sops-age

  initContainers:
    - name: install-ksops
      image: viaductoss/ksops:v4.5.1
      command: ["ksops", "install", "--with-kustomize", "/custom-tools"]
      volumeMounts:
        - name: custom-tools
          mountPath: /custom-tools

  env:
    - name: XDG_CONFIG_HOME
      value: /.config
    - name: SOPS_AGE_KEY_FILE
      value: /.config/sops/age/keys.txt

  volumeMounts:
    - name: custom-tools
      mountPath: /usr/local/bin/kustomize
      subPath: kustomize
    - name: custom-tools
      mountPath: /usr/local/bin/ksops
      subPath: ksops
    - name: sops-age
      mountPath: /.config/sops/age
      readOnly: true

