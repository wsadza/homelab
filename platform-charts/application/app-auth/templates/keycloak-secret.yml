{{- if and .Values.appAuth.keycloak.enabled .Values.appAuth.keycloak.client.enabled }}
{{- $client := .Values.appAuth.keycloak.client }}
{{- $namespace := default .Values.appAuth.keycloak.namespace $client.namespace }}
{{- $secretName := required "appAuth.keycloak.client.secretName is required" $client.secretName }}
{{- $secretKey := default "client-secret" $client.secretKey }}
{{- $existing := lookup "v1" "Secret" $namespace $secretName }}
{{- $existingValue := "" }}
{{- if and $existing $existing.data }}
{{- $existingValue = index $existing.data $secretKey }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $namespace }}
type: Opaque
data:
  {{ $secretKey }}: {{ default (randAlphaNum 48 | b64enc) $existingValue | quote }}
{{- end }}
