#
# : AppSecurity (wrapper chart)
# ===============================================================

appSecurity:
  enabled: true

  # ===============================================
  # @section NetworkPolicy parameters
  # ===============================================

  # @param appSecurity.networkPolicies List of NetworkPolicy resources to generate.
  networkPolicies:
  
  # Description:
  # - Allow consuming Kubernetes DNS 
 
  - enabled: true
    name: allow-dns-egress
    namespace: "{{ namespace  }}"
    labels: {}
    annotations: {}
    podSelector:
      matchLabels:
        app.kubernetes.io/name: "{{ name }}"
    policyTypes:
      - Egress 
    egress:
      - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system 
        ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    ingress: []

  # Description:
  # - Allow ingress traffic to from envoy-gatawy-system
  - enabled: true
    name: allow-from-gateway
    namespace: "{{ namespace  }}"
    labels: {}
    annotations: {}
    podSelector:
      matchLabels:
        app.kubernetes.io/name: "{{ name }}"
    policyTypes:
      - Ingress
    ingress:
      - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
    egress: []

  # Description:
  # - Block all ingress and egress in namespace
  - enabled: true
    name: deny-all-ingress
    namespace: "{{ namespace }}"
    podSelector: {}
    policyTypes:
    - Ingress
    - Egress
    ingress: []
