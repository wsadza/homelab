{{- if and .Values.platformAuth.keycloak.enabled .Values.platformAuth.keycloak.users }}
{{- $root := . -}}
{{- range $user := .Values.platformAuth.keycloak.users }}
{{- $userDetails := mergeOverwrite (deepCopy $root.Values.platformAuth.keycloak.userDefaults) $user }}
{{- if $userDetails.enabled }}

{{- $userResourceName := $user.username | replace "." "-" | trunc 56 | trimSuffix "-" }}
{{- $passwordSecret := $userDetails.passwordSecret | default dict }}

{{- $secretMode := $passwordSecret.mode }}
{{- $secretKey := $passwordSecret.key }}
{{- $secretName := default (printf "%s-secret" $userResourceName) $passwordSecret.name }}

{{- if not (has $secretMode (list "existing" "create" "none")) }}
{{- fail (printf "Invalid passwordSecret.mode for user %s. Allowed values: existing, create, none" $userDetails.username) }}
{{- end }}

{{- if and (eq $secretMode "existing") (not $passwordSecret.name) }}
{{- fail (printf "User %s has passwordSecret.mode=existing but passwordSecret.name is empty" $userDetails.username) }}
{{- end }}

{{- $requiredUserActions := $userDetails.requiredUserActions | default list }}
{{- if eq $passwordSecret.mode "create" }}
{{- $requiredUserActions = append $requiredUserActions "UPDATE_PASSWORD" | uniq }}
{{- end }}

---
apiVersion: v1.edp.epam.com/v1
kind: KeycloakRealmUser
metadata:
  name: {{ $userResourceName | quote }}
  namespace: {{ include "common.names.namespace" $root }}
  labels:
    {{- include "common.labels.standard" $root | nindent 4 }}
spec:
  realmRef:
    name: {{ $root.Values.platformAuth.keycloak.realm.name | quote }}
    kind: "KeycloakRealm"

  username: {{ $userDetails.username | quote }}

  {{- with $userDetails.firstName }}
  firstName: {{ . | quote }}
  {{- end }}

  {{- with $userDetails.lastName }}
  lastName: {{ . | quote }}
  {{- end }}

  {{- with $userDetails.email }}
  email: {{ . | quote }}
  {{- end }}

  {{- if hasKey $userDetails "emailVerified" }}
  emailVerified: {{ $userDetails.emailVerified }}
  {{- end }}

  {{- if hasKey $userDetails "enabled" }}
  enabled: {{ $userDetails.enabled }}
  {{- end }}

  {{- with $userDetails.reconciliationStrategy }}
  reconciliationStrategy: {{ . | quote }}
  {{- end }}

  {{- if hasKey $user "keepResource" }}
  keepResource: {{ $userDetails.keepResource }}
  {{- end }}

  {{- if ne $secretMode "none" }}
  passwordSecret:
    name: {{ $secretName | quote }}
    key: {{ $secretKey | quote }}
  {{- end }}

  {{- with $requiredUserActions }}
  requiredUserActions:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  {{- with $userDetails.roles }}
  roles:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  {{- with $userDetails.groups }}
  groups:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
