apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: podinfo-host
  namespace: podinfo
spec:
  parentRefs:
    - name: acme-public
      namespace: envoy-gateway-system
      sectionName: http
  hostnames:
    - podinfo.anykey.pl
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - kind: Service
          name: podinfo
          namespace: podinfo
          port: 9898

