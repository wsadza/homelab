apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-host
  namespace: argocd 
spec:
  paretnRefs:
    - name: gateway-argocd
      namespace: envoy-gateway-system
      sectionName: argocd 
    - name: gateway-argocd
      namespace: envoy-gateway-system
      sectionName: argocd-https
  hostnames:
    - argocd.anykey.pl
  rules:
    - backendRefs:
        - kind: Service
          name: argocd-server
          namespace: argocd-server
          port: 8080
