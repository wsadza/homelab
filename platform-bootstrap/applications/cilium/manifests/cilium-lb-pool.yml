apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: lan-pool
spec:
  blocks:
    - start: 192.168.1.240
      stop: 192.168.1.250
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: lan-l2
spec:
  serviceSelector:
    matchLabels: {}

  interfaces:
    # ---------------
    # Check your interface:
    # - ip route get 1.1.1.1
    # ---------------
    - wlp5s0

  externalIPs: true
  loadBalancerIPs: true
