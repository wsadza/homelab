{{- if and .Values.appPlatform.gatewayApi.enabled .Values.appPlatform.gatewayApi.gateway.enabled }}
{{- $root := . -}}
{{- with .Values.appPlatform.gatewayApi.gateway }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ default (printf "gateway-%s" (include "common.names.fullname" $root )) .name }} 
  namespace: {{ default (include "common.names.namespace" $root ) .namespace }} 
  {{- with .labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  gatewayClassName: {{ .gatewayClassName | quote }}
  listeners:
  {{- range .listeners }}
  - name: {{ .name }}
    protocol: {{ .protocol }}
    port: {{ .port }}
    hostname: {{ .hostname }}
    {{- with .tls }}
    tls:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .allowedRoutes }}
    allowedRoutes:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }} 
{{- end }} 
{{- end }} 
