apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: kubernetes-secrets-seaweed
spec:
  provider:
    kubernetes:
      remoteNamespace: seaweedfs
      server:
        url: https://kubernetes.default.svc
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: seaweedfs
      auth:
        serviceAccount:
          name: external-secrets
          namespace: external-secrets
---
