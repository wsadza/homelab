{{- if .Values.openldap.configuration.bootstrap.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "common.names.fullname" . }}-bootstrap-ldif
  namespace: {{ include "common.names.namespace" . }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
data:
  {{- range .Values.openldap.configuration.bootstrap.seeds }}
  {{- if .enabled }}
  {{ .name }}: |
{{- .data | nindent 4 }}
  {{- end }}
  {{- end }}
{{- end }}
