# -- Argo Instance Extra Configuration
configs:
  cm:
    kustomize.buildOptions: "--enable-alpha-plugins --enable-exec"

  # -- Create the argocd-secret
  secret:
    createSecret: false 

# -- SOPS

repoServer:
  volumes:
    - name: custom-tools
      emptyDir: {}
    - name: sops-age
      secret:
        secretName: sops-age

  initContainers:
    - name: install-ksops
      image: viaductoss/ksops:v4.5.1
      command: ["ksops", "install", "--with-kustomize", "/custom-tools"]
      volumeMounts:
        - name: custom-tools
          mountPath: /custom-tools

  env:
    - name: XDG_CONFIG_HOME
      value: /.config
    - name: SOPS_AGE_KEY_FILE
      value: /.config/sops/age/keys.txt

  volumeMounts:
    - name: custom-tools
      mountPath: /usr/local/bin/kustomize
      subPath: kustomize
    - name: custom-tools
      mountPath: /usr/local/bin/ksops
      subPath: ksops
    - name: sops-age
      mountPath: /.config/sops/age
      readOnly: true

