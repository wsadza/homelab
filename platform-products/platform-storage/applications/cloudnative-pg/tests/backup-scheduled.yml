apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: daily-backup
  namespace: default 
spec:
  schedule: "0 0 0 * * *"   # every day at 00:00:00
  immediate: true           # also run once immediately when created
  backupOwnerReference: self
  cluster:
    name: psql-instance 
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
