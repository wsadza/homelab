#
# : AppAuth (wrapper chart)
# ===============================================================

appAuth:

  # ===============================================
  # @section Keycloak parameters
  # ===============================================
  
  keycloak:
    enabled: true

    # -----------------------------------------------
    # @subsection relam reference parameters
    # -----------------------------------------------
    #
    realmRef:
      name: platform 
      kind: KeycloakRealm

    # -----------------------------------------------
    # @subsection client parameters
    # -----------------------------------------------
    #
    client:
      enabled: true
     
      name: nextcloud
      namespace: keycloak 
      labels: []
      annotations: []

      clientId: nextcloud 
      clientSecret:
        name: keycloak-client-secret-nextcloud 
        key: client-secret

      public: false
      directAccess: true
      advancedProtocolMappers: true
      webUrl: https://nextcloud.anykey.pl
      adminUrl: https://nextcloud.anykey.pl
      homeUrl: /
      redirectUris:
        - https://nextcloud.anykey.pl/apps/user_oidc/code
      defaultClientScopes:
        - groups
