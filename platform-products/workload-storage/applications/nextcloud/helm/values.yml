# ===============================================================
# : Nextcloud (external application)
# ===============================================================

nextcloud:
  host: nextcloud.anykey.pl 

  existingSecret:
    enabled: true
    secretName: nextcloud-admin-secret
    usernameKey: username
    passwordKey: password

  extraEnv:
    - name: OIDC_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: keycloak-client-secret-nextcloud
          key: client-secret

    - name: KEYCLOAK_REALM
      value: "platform"

    - name: KEYCLOAK_ENDPOINT 
      value: "https://keycloak.anykey.pl/realms/${KEYCLOAK_REALM}/.well-known/openid-configuration"

  trustedDomains:
    - nextcloud.anykey.pl 
    - nextcloud.nextcloud.svc.cluster.local

  configs:
    proxy.config.php: |-
      <?php
      $CONFIG = array (
        'trusted_proxies' =>
        array (
          0 => '127.0.0.1',
          1 => '::1',
          2 => '10.0.0.0/8',
          3 => '172.16.0.0/12',
          4 => '192.168.0.0/16',
        ),
        'forwarded_for_headers' =>
        array (
          0 => 'HTTP_X_FORWARDED_FOR',
        ),
      );

  hooks:

hooks:
  post-installation: |
    #!/bin/bash
    set -eu

    php occ app:install user_oidc || true
    php occ app:enable user_oidc

  post-upgrade: |
    #!/bin/bash
    set -eu

    php occ app:install user_oidc || true
    php occ app:enable user_oidc

  before-starting: |
    #!/bin/bash
    set -eu

    # Ensure app is available/enabled.
    php occ app:enable user_oidc || {
      php occ app:install user_oidc
      php occ app:enable user_oidc
    }

    # Recreate provider on every container start.
    # Ignore error if provider does not exist yet.
    php occ user_oidc:provider:delete Keycloak || true

    php occ user_oidc:provider Keycloak \
      --clientid="nextcloud" \
      --clientsecret="${OIDC_CLIENT_SECRET}" \
      --discoveryuri="${KEYCLOAK_ENDPOINT}" \
      --scope="openid profile email groups" \
      --unique-uid=1 \
      --group-provisioning=1

    # Optional: keep normal Nextcloud login button.
    php occ config:app:set user_oidc allow_multiple_user_backends --value=1

  objectStore:
    s3:
      enabled: true
      host: seaweedfs-s3.seaweedfs.svc.cluster.local
      port: "8333"
      ssl: false
      region: us-east-1
      bucket: nextcloud
      usePathStyle: true
      autoCreate: false
      existingSecret: seaweedfs-s3-secret
      secretKeys:
        accessKey: accessKey
        secretKey: secretKey
        bucket: bucket
        host: host

persistence:
  enabled: true
  size: 10Gi

internalDatabase:
  enabled: false

postgresql:
  enabled: false

mariadb:
  enabled: false

externalDatabase:
  enabled: true
  type: postgresql
  host: nextcloud-postgresql-rw.nextcloud.svc.cluster.local:5432
  database: nextcloud
  existingSecret:
    enabled: true
    secretName: nextcloud-database-secret
    usernameKey: username
    passwordKey: password

cronjob:
  enabled: true

# -----------------------------------------------
# @section common parameters
# -----------------------------------------------
#
# @param nameOverride      : String to partially override common.names.name
# @param fullnameOverride  : String to fully override common.names.fullname
# @param namespaceOverride : String to fully override common.names.namespace
# @param commonLabels      : Labels to add to all deployed objects
# @param commonAnnotations : Annotations to add to all deployed objects
nameOverride: ""
fullnameOverride: "nextcloud"
namespaceOverride: ""
commonLabels: {}
commonAnnotations: {}

