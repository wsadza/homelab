applications:

  # ------------------
  # Podinfo
  # ------------------

    - name: podinfo 
      namespace: podinfo 

      enabled: true
      priority: 0

      syncPolicy:
        automated: false

      sources:

        - type: values
          repoURL: https://github.com/wsadza/homelab.git
          targetRevision: HEAD
          ref: values

        - type: helm
          repoURL: https://stefanprodan.github.io/podinfo
          targetRevision: 6.9.1
          chart: podinfo 
          valueFiles: 
            - $values/platform-products/workload-tests/applications/podinfo/helm/values.yml
        
        - type: helm 
          repourl: https://github.com/wsadza/homelab.git
          targetrevision: head
          path: platform-charts/application/app-platform
          valuefiles: 
            - $values/platform-products/workload-tests/applications/podinfo/helm/values.yml

        - type: helm 
          repourl: https://github.com/wsadza/homelab.git
          targetrevision: head
          path: platform-charts/application/app-security
          valuefiles: 
            - $values/platform-products/workload-tests/applications/podinfo/helm/values.yml
