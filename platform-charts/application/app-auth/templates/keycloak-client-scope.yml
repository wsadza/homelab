apiVersion: v1.edp.epam.com/v1
kind: KeycloakClientScope
metadata:
  name: groups
  namespace: podinfo 
spec:
  realmRef:
    name: platform
    kind: KeycloakRealm
  name: groups
  protocol: openid-connect
  protocolMappers:
    - name: groups
      protocol: openid-connect
      protocolMapper: oidc-group-membership-mapper
      config:
        claim.name: groups
        full.path: "false"
        id.token.claim: "true"
        access.token.claim: "true"
        userinfo.token.claim: "true"
