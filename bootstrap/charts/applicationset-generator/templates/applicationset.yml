---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ $.Values.name }} 
  namespace: 'argocd'
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
  - matrix:
      generators:
         - git:
             repoURL: 'https://github.com/wsadza/homelab'
             revision: HEAD 
             requeueAfterSeconds: 30
             files:
               - path: {{ $.Values.file }}
         - list:
             elementsYaml: |
               {{ `{{- $enabledApps := list }}` }}
               {{ `{{- range .applications }}` }}
               {{ `{{- if (dig "enabled" true .) }}` }}
               {{ `{{- $enabledApps = append $enabledApps . }}` }}
               {{ `{{- end }}` }}
               {{ `{{- end }}` }}
               {{ `{{ $enabledApps | toYaml }}` }}
  template:
    metadata:
      name: '{{ `{{ .name }}` }}'
    spec:
      project: default 
      destination:
        server: 'https://kubernetes.default.svc'
        namespace: 'default'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
  templatePatch: |
    metadata:
      annotations:
        {{ `{{- if hasKey . "priority" }}` }}
        argocd.argoproj.io/sync-wave: "{{ `{{ .priority }}` }}"
        {{ `{{- end }}` }}
    spec:
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
          {{ `{{- range (dig "syncPolicy" "syncOptions" (list) .) }}` }}
          - {{ `{{ . }}` }}
          {{ `{{- end }}` }}
      destination:
        {{ `{{- if hasKey . "namespace" }}` }}
        namespace: {{ `{{ .namespace }}` }} 
        {{ `{{- else }}` }}
        namespace: {{ `{{ .name }}` }} 
        {{ `{{- end }}` }}
      sources:
        {{ `{{- if hasKey . "repoURL" }}` }}
        - repoURL: {{ `{{ .repoURL }}` }} 
          targetRevision: {{ `{{ .targetRevision }}` }} 

          {{ `{{- if hasKey . "chartPath" }}` }}
          path: {{ `{{ .chartPath }}` }}
          {{ `{{- end -}}` }}

          {{ `{{- if hasKey . "chartName" }}` }}
          chart: {{ `{{ .chartName }}` }} 
          {{ `{{- end -}}` }}
          
          {{ `{{- if not (or (hasKey . "chartPath") (hasKey . "chartName")) }}` }}
          chart: {{ `{{ .name }}` }}
          {{ `{{- end }}` }}

          {{ `{{- if hasKey . "chartValues" }}` }}
          helm:
            valueFiles:
              - $values/products/{{ $.Values.name }}/applications/{{ `{{ .name }}` }}/helm/values.yml
          {{ `{{- end -}}` }}
        {{ `{{- end -}}` }}
        {{ `{{- if hasKey . "chartValues" }}` }}
        - repoURL: 'https://github.com/wsadza/homelab'
          targetRevision: HEAD
          ref: values
        {{ `{{- end -}}` }}

        {{ `{{- if hasKey . "manifests" }}` }}
        - repoURL: 'https://github.com/wsadza/homelab'
          targetRevision: HEAD
          path: products/{{ $.Values.name }}/applications/{{ `{{ .name }}` }}/manifests/
        {{ `{{- end -}}` }}  
...
